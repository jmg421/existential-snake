<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>🔴 SKIBIDI THINGS 🔴</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Comic+Neue:wght@700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0000;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Comic Neue','Comic Sans MS',cursive;color:#e0e0e0;flex-direction:column;overflow:hidden}
  canvas{border:2px solid #400;z-index:1}
  #title{font-family:'Creepster',cursive;font-size:28px;color:#c22;letter-spacing:8px;margin-bottom:6px;text-shadow:0 0 15px #f00,0 0 40px #900,0 0 80px #600;z-index:2;text-transform:uppercase}
  #subtitle{font-size:11px;color:#622;letter-spacing:4px;margin-bottom:8px;font-family:'Creepster',cursive}
  #thought{height:50px;max-width:620px;text-align:center;padding:8px;font-size:20px;color:#f44;margin-top:10px;z-index:2;text-shadow:0 0 10px #f00}
  #score{font-size:16px;color:#f44;margin-bottom:4px;z-index:2;text-shadow:0 0 8px #f00}
  #combo{position:fixed;top:20px;right:30px;font-size:40px;z-index:99;opacity:0;transition:all .2s;text-shadow:0 0 20px #f00}
  #combo.show{opacity:1;transform:scale(1.3)}
  #dimension{position:fixed;top:20px;left:30px;font-size:16px;z-index:99;color:#c44;text-shadow:0 0 10px #f00;font-family:'Creepster',cursive;letter-spacing:3px}
  #gameover{display:none;position:absolute;text-align:center;background:rgba(10,0,0,0.97);padding:40px;border:2px solid #c22;z-index:100;font-family:'Creepster',cursive}
  #gameover h1{font-size:40px;color:#f33;margin-bottom:15px;text-shadow:0 0 20px #f00;letter-spacing:4px}
  #gameover p{color:#a66;margin-bottom:20px;font-size:18px;line-height:1.6;white-space:pre-line;font-family:'Comic Neue',cursive}
  #gameover span{color:#f44;font-size:15px;cursor:pointer;letter-spacing:2px}
  #gameover span:hover{color:#fff;text-shadow:0 0 15px #f00}
  .pop{position:fixed;font-size:70px;pointer-events:none;z-index:50;opacity:0;animation:popIn 1.2s ease-out forwards}
  @keyframes popIn{0%{opacity:1;transform:scale(.2) rotate(-30deg)}40%{opacity:1;transform:scale(1.5) rotate(15deg)}100%{opacity:0;transform:scale(3) rotate(0) translateY(-80px)}}
  .floatText{position:fixed;pointer-events:none;z-index:60;font-size:28px;font-weight:bold;opacity:0;animation:floatUp 1.5s ease-out forwards}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(1.5)}}
  .stChar{position:fixed;pointer-events:none;z-index:0;opacity:0;animation:charFade 3s ease-out forwards;font-size:120px;filter:drop-shadow(0 0 30px rgba(255,0,0,0.5))}
  @keyframes charFade{0%{opacity:0;transform:scale(.5)}20%{opacity:.12}80%{opacity:.12}100%{opacity:0;transform:scale(1.1)}}
  .xmasLight{position:absolute;width:12px;height:12px;border-radius:50%;filter:blur(3px);opacity:0;transition:opacity .3s}
  #lights{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  #watermark{position:fixed;bottom:10px;font-size:11px;color:#311;z-index:2;font-family:'Creepster',cursive;letter-spacing:2px}
  #soundboard{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:500px;z-index:99}
  .sb-btn{background:rgba(40,0,0,0.8);border:1px solid #600;border-radius:8px;padding:6px 10px;font-size:18px;cursor:pointer;color:#f88;font-family:'Comic Neue',cursive;transition:all .1s;user-select:none;-webkit-user-select:none}
  .sb-btn:active{transform:scale(1.2);background:#800;border-color:#f44;box-shadow:0 0 15px #f00}
  .sb-btn:hover{border-color:#f44;text-shadow:0 0 8px #f00}
  #vecna{position:fixed;pointer-events:none;z-index:0;font-size:200px;opacity:0;transition:opacity 2s;top:50%;left:50%;transform:translate(-50%,-50%)}
  #charImg{position:fixed;pointer-events:none;z-index:0;opacity:0;transition:opacity 1.5s;bottom:20px;right:20px;width:150px;border-radius:8px;border:2px solid #400}
</style></head><body>
<div id="lights"></div>
<div id="title">Skibidi Things</div>
<div id="subtitle">the upside down has wifi now</div>
<div id="score">aura: 0 | dimension: right-side up</div>
<canvas id="c" width="600" height="400"></canvas>
<div id="thought">press arrow key to enter hawkins 🔴</div>
<div id="combo"></div>
<div id="dimension">THE RIGHT-SIDE UP</div>
<div id="gameover"><h1 id="goTitle"></h1><p id="lesson"></p><span onclick="location.reload()">[ run from vecna again ]</span></div>
<div id="watermark">friends dont lie. but this snake does.</div>
<div id="soundboard"></div>
<div id="vecna">🕷️</div>
<img id="charImg" src="" alt="">
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const G=20,W=canvas.width/G,H=canvas.height/G;
let snake=[{x:15,y:10}],dir={x:0,y:0},food,score=0,alive=true,started=false,tick;
let hue=0,screenShake=0,combo=0,comboTimer=0,particles=[],speedMs=120;
let upsideDown=false,demogorgonFood=false,lightEls=[],lightPattern=0;

// Stranger Things character images from the wiki/fandom
const stImages=[
  'https://upload.wikimedia.org/wikipedia/en/e/e0/Eleven_Stranger_Things.png',
  'https://upload.wikimedia.org/wikipedia/en/5/cinquenta/Dustin_Henderson.jpg',
];
// ST character emoji stand-ins (more reliable than images loading)
const stChars=['🧒','👧','🚲','🧇','📺','💡','🎄','🔦','🏚️','🕷️','👾','🌀','🔴','⬡'];
const emojis=['💀','🗿','😭','🔥','💯','🧠','👁️','🫠','🤡','😈','🕷️','🔴','⬡','👾','🌀','🫨','🤯','🧇','💡','📺','🚲','🎄'];
const floatTexts=['GYATT','SIGMA','RIZZ','SKIBIDI','BUSSIN','GOATED','SLAY','NO CAP','FR FR','OHIO','FANUM TAX','BASED','SHEESH','LOCK IN','AURA +100','BRAINROT','DELULU','ELEVEN/10','FRIENDS DONT LIE','THE UPSIDE DOWN','RUN','VECNA RIZZ','DEMOGORGON ATE','HAWKINS OHIO','MOUTH BREATHER','SHOULD I STAY OR SHOULD I GO','RUNNING UP THAT HILL','MORNINGS ARE FOR COFFEE AND CONTEMPLATION'];

// Stranger Things ASCII art characters that appear on screen
const stAsciiChars=[
  {name:'ELEVEN',art:'011',color:'#f8a'},
  {name:'DEMOGORGON',art:'🌸',color:'#f44'},
  {name:'VECNA',art:'🕷️',color:'#a00'},
  {name:'MIND FLAYER',art:'🌩️',color:'#606'},
  {name:'DUSTIN',art:'🧢',color:'#4af'},
  {name:'HOPPER',art:'🎖️',color:'#fa0'},
  {name:'WILL',art:'💡',color:'#ff0'},
  {name:'MAX',art:'🎧',color:'#f44'},
];

const thoughts=[
  ["entering hawkins... lowkey scared ngl","first bite in the right-side up. mid.","will byers would never 💀","the demogorgon has more rizz than me"],
  ["im literally eleven rn no cap","this is giving hawkins lab energy","the mind flayer is just vecnas skibidi form","fanum taxing these eggo waffles 🧇"],
  ["bro think he a demogorgon 💀","the upside down is just ohio fr","vecna got that sigma stare ngl","hopper would be proud. or concerned."],
  ["im so goated even the mind flayer noticed","the gate is open and so is my third eye","chat is this the upside down or ohio\n(same thing)","running up that hill but make it snake 🎧"],
  ["the lights are flickering and so is my sanity","joyce would be spelling my name on the wall rn","every christmas light is a cry for help","stranger things have happened\n(literally)"],
  ["the vines are giving me the ick","im in my vecna arc fr fr","the upside down cant contain my aura","eleven could never (she could actually)"],
  ["i am the demogorgon now 🌀","the mind flayer wishes he had this length","my tail extends into the upside down","dustin would understand me 🧢"],
  ["the gate between dimensions is just\na skill issue","vecnas curse is just brainrot\nchange my mind","im not running from vecna\nvecna is running from me 🗿"],
  ["i have become the upside down\nthe upside down has become me","the demogorgon was the friends\nwe made along the way","maxs favorite song cant save me now 🎧"],
  ["i have seen all dimensions\nright-side up. upside down. and ohio.\nohio was the worst. 💀","the final gate has opened\ni am the snake that runs through all worlds\nskibidi dop dop yes yes 🚽"]
];

const lessons=[
  "SCORE aura. consumed by the upside down.\nvecna sends his regards 🕷️","skill issue + ratio + fell off\n+ no aura + the demogorgon ate better","the lights flickered SCORE times\nand then went dark forever\njust like your attention span",
  "you survived SCORE meals in hawkins\nwhich is SCORE more than barb 💀\n(rip barb. gone but not forgotten.)","the mind flayer claimed another one\nSCORE points of pure delusion\nthe upside down remembers nothing",
  "SCORE aura lost between dimensions\nshould have run up that hill\nshould have played your favorite song\nbut you chose to be a snake instead 🎧"
];

const goTitles=["VECNA GOT YOU 🕷️","THE UPSIDE DOWN WINS","💀 DEMOGORGOND 💀","SKILL ISSUE (HAWKINS EDITION)","THE GATE CLOSED ON YOU","MOUTH BREATHER 🗿","BARBD 💀"];

// SETUP
function setupLights(){
  const container=document.getElementById('lights');
  const colors=['#f00','#0f0','#ff0','#00f','#f0f','#0ff','#f80'];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');el.className='xmasLight';
    el.style.left=Math.random()*95+'%';el.style.top=Math.random()*95+'%';
    el.style.background=colors[i%colors.length];
    el.style.boxShadow=`0 0 10px ${colors[i%colors.length]}`;
    container.appendChild(el);lightEls.push(el);
  }
}
setupLights();

let audioCtx;
function beep(freq,dur,type='square'){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0.07,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function eatSound(){sbSounds[Math.floor(Math.random()*sbSounds.length)].fn();}
function dieSound(){[200,150,100,60].forEach((f,i)=>setTimeout(()=>beep(f,.4,'sawtooth'),i*120));}

// HELPER FUNCTIONS
function spawn(){
  do{food={x:Math.floor(Math.random()*W),y:Math.floor(Math.random()*H)};}
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
  demogorgonFood=Math.random()<.3&&score>3;
}
spawn();

function popEmoji(n=1){for(let i=0;i<n;i++){const el=document.createElement('div');el.className='pop';el.textContent=emojis[Math.floor(Math.random()*emojis.length)];el.style.left=Math.random()*80+5+'%';el.style.top=Math.random()*60+10+'%';el.style.fontSize=(50+Math.random()*60)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1200);}}

function popText(){const el=document.createElement('div');el.className='floatText';el.textContent=floatTexts[Math.floor(Math.random()*floatTexts.length)];const h=upsideDown?0:Math.random()*360;el.style.color=`hsl(${h},100%,70%)`;el.style.textShadow=`0 0 20px hsl(${h},100%,50%)`;el.style.left=Math.random()*70+10+'%';el.style.top=Math.random()*50+20+'%';document.body.appendChild(el);setTimeout(()=>el.remove(),1500);}

function showSTCharacter(){
  const ch=stAsciiChars[Math.floor(Math.random()*stAsciiChars.length)];
  const el=document.createElement('div');el.className='stChar';
  el.innerHTML=`<div style="text-align:center"><div style="font-size:100px">${ch.art}</div><div style="font-family:Creepster,cursive;font-size:20px;color:${ch.color};text-shadow:0 0 15px ${ch.color};margin-top:5px">${ch.name}</div></div>`;
  el.style.left=Math.random()*60+15+'%';el.style.top=Math.random()*40+15+'%';
  document.body.appendChild(el);setTimeout(()=>el.remove(),3000);
}

function addParticles(x,y,n){for(let i=0;i<n;i++){particles.push({x:x*G+G/2,y:y*G+G/2,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,life:1,hue:upsideDown?Math.random()*30:Math.random()*360,size:Math.random()*4+2});}}

function flickerLights(){
  lightPattern++;
  lightEls.forEach((el,i)=>{
    const on=Math.sin(lightPattern*.3+i*1.7)>0.2||(upsideDown&&Math.random()>.5);
    el.style.opacity=on?(upsideDown?.4:.2):'0';
  });
}
setInterval(flickerLights,200);

function flipDimension(){
  upsideDown=!upsideDown;screenShake=15;
  if(upsideDown){
    beep(80,.5,'sawtooth');setTimeout(()=>beep(60,.5,'sawtooth'),200);
    canvas.style.filter='saturate(0.5) brightness(0.7)';
    document.getElementById('dimension').textContent='⬡ THE UPSIDE DOWN ⬡';
    document.getElementById('dimension').style.color='#f44';
    document.getElementById('vecna').style.opacity='0.06';
    document.body.style.background='#0a0000';
    popEmoji(4);popText();showSTCharacter();
  }else{
    beep(523,.15);setTimeout(()=>beep(659,.15),100);
    canvas.style.filter='';
    document.getElementById('dimension').textContent='THE RIGHT-SIDE UP';
    document.getElementById('dimension').style.color='#c44';
    document.getElementById('vecna').style.opacity='0';
    document.body.style.background='#0a0a0a';
    showSTCharacter();
  }
  document.getElementById('score').textContent='aura: '+score+' | dimension: '+(upsideDown?'upside down 🕷️':'right-side up 🔴');
}

function updateCombo(){
  combo++;comboTimer=3;
  const el=document.getElementById('combo');
  el.textContent=(combo>1?combo+'x COMBO ':'')+(combo>=3?'🔥':'')+(combo>=5?'🔥🔥':'')+(combo>=8?'💀💀💀':'')+(combo>=10?'🕷️VECNA MODE':'');
  el.className=combo>1?'show':'';el.style.color=upsideDown?'#f44':`hsl(${(hue+combo*30)%360},100%,70%)`;
}

function think(){const tier=Math.min(Math.floor(score),thoughts.length-1);const pool=thoughts[tier];document.getElementById('thought').textContent=pool[Math.floor(Math.random()*pool.length)];}

// GAME LOGIC
function die(){
  alive=false;clearInterval(tick);dieSound();
  document.getElementById('gameover').style.display='block';
  document.getElementById('goTitle').textContent=goTitles[Math.floor(Math.random()*goTitles.length)];
  document.getElementById('lesson').textContent=lessons[Math.floor(Math.random()*lessons.length)].replace(/SCORE/g,score);
  for(let i=0;i<20;i++)setTimeout(()=>popEmoji(2),i*70);
  for(let i=0;i<8;i++)setTimeout(()=>popText(),i*150);
  for(let i=0;i<4;i++)setTimeout(()=>showSTCharacter(),i*400);
  canvas.style.filter='hue-rotate(180deg) saturate(3) brightness(0.5)';
  document.getElementById('vecna').style.opacity='0.15';
  let f=0;const ff=setInterval(()=>{lightEls.forEach(el=>{el.style.opacity=Math.random()>.3?'0.6':'0';});if(++f>30)clearInterval(ff);},80);
}

function step(){
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=W||head.y<0||head.y>=H||snake.some(s=>s.x===head.x&&s.y===head.y))return die();
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score++;eatSound();updateCombo();
    const fires='🔥'.repeat(Math.min(Math.floor(score/5),5));
    document.getElementById('score').textContent='aura: '+score+' '+fires+(score>20?' 👑':'')+(score>30?' VECNA FEARS ME':'')+' | dimension: '+(upsideDown?'upside down 🕷️':'right-side up 🔴');
    spawn();think();screenShake=8+combo*2;
    popEmoji(Math.min(combo,6));if(combo>=3)popText();
    addParticles(head.x,head.y,15+combo*5);
    if(demogorgonFood){popEmoji(5);popText();screenShake=20;addParticles(head.x,head.y,40);showSTCharacter();}
    // show a ST character every 5 points
    if(score%5===0)showSTCharacter();
    // dimension flip every 7 points
    if(score%7===0)flipDimension();
    if(score%3===0){speedMs=Math.max(45,speedMs-3);clearInterval(tick);tick=setInterval(loop,speedMs);}
  }else{snake.pop();comboTimer-=.12;if(comboTimer<=0){combo=0;document.getElementById('combo').className='';}}
}

// DRAW
function draw(){
  let sx=0,sy=0;
  if(screenShake>0){sx=(Math.random()-.5)*screenShake*2;sy=(Math.random()-.5)*screenShake*2;screenShake*=.85;if(screenShake<.3)screenShake=0;}
  ctx.save();ctx.translate(sx,sy);hue=(hue+.7)%360;

  // background
  ctx.fillStyle=upsideDown?`rgb(${8+Math.sin(Date.now()/1000)*3},0,0)`:`hsl(${hue},5%,${3+Math.sin(Date.now()/1000)}%)`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // upside down effects
  if(upsideDown){
    // floating spores
    for(let i=0;i<15;i++){
      const px=(Math.sin(Date.now()/2000+i*47)*300+300)%600;
      const py=(Date.now()/20+i*137)%400;
      ctx.fillStyle=`rgba(200,50,50,${.1+Math.sin(Date.now()/1000+i)*.05})`;
      ctx.fillRect(px,py,2,2);
    }
    // vine tendrils
    for(let i=0;i<8;i++){
      const vx=Math.sin(Date.now()/3000+i*2)*20;
      ctx.strokeStyle=`rgba(100,0,0,${.15+Math.sin(Date.now()/1500+i)*.05})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(i*75+vx,0);ctx.quadraticCurveTo(i*75+vx+20,50+Math.sin(Date.now()/2000+i)*20,i*75+vx,100+Math.sin(Date.now()/1500+i)*30);ctx.stroke();
      ctx.beginPath();ctx.moveTo(i*75+vx,400);ctx.quadraticCurveTo(i*75+vx-20,350+Math.sin(Date.now()/2000+i)*20,i*75+vx,300-Math.sin(Date.now()/1500+i)*30);ctx.stroke();
    }
    ctx.lineWidth=1;
  }

  // grid
  ctx.strokeStyle=upsideDown?'rgba(100,0,0,0.15)':`hsla(${hue},60%,25%,0.1)`;
  for(let x=0;x<W;x++){ctx.beginPath();ctx.moveTo(x*G,0);ctx.lineTo(x*G,canvas.height);ctx.stroke();}
  for(let y=0;y<H;y++){ctx.beginPath();ctx.moveTo(0,y*G);ctx.lineTo(canvas.width,y*G);ctx.stroke();}

  // particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=.03;p.vx*=.95;p.vy*=.95;if(p.life<=0)return false;ctx.fillStyle=`hsla(${p.hue},100%,60%,${p.life})`;ctx.shadowColor=`hsl(${p.hue},100%,60%)`;ctx.shadowBlur=8;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);ctx.shadowBlur=0;return true;});

  // snake
  snake.forEach((s,i)=>{
    let snakeHue=upsideDown?(i*3)%30:(hue+i*10)%360;
    let sat=upsideDown?60:80+Math.sin(Date.now()/300+i)*20;
    let light=i===0?(upsideDown?60:80):Math.max(upsideDown?20:35,(upsideDown?50:70)-(i/snake.length)*(upsideDown?35:40));
    ctx.fillStyle=`hsl(${snakeHue},${sat}%,${light}%)`;
    ctx.shadowColor=upsideDown?'hsl(0,80%,40%)':`hsl(${snakeHue},100%,50%)`;ctx.shadowBlur=i===0?20:8;
    const wb=score>15?Math.sin(Date.now()/200+i)*2:0;const wby=score>15?Math.cos(Date.now()/200+i)*2:0;
    ctx.fillRect(s.x*G+1+wb,s.y*G+1+wby,G-2,G-2);
    if(i===0){
      ctx.fillStyle=upsideDown?'#f00':'#000';ctx.shadowBlur=0;
      const ex=dir.x*3,ey=dir.y*3,eyeSize=Math.min(5,3+score/15);
      ctx.beginPath();ctx.arc(s.x*G+6+ex+wb,s.y*G+7+ey+wby,eyeSize,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(s.x*G+14+ex+wb,s.y*G+7+ey+wby,eyeSize,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=upsideDown?'#000':'#fff';
      ctx.beginPath();ctx.arc(s.x*G+6+ex+wb-1,s.y*G+7+ey+wby-1,eyeSize*.4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(s.x*G+14+ex+wb-1,s.y*G+7+ey+wby-1,eyeSize*.4,0,Math.PI*2);ctx.fill();
    }
  });
  ctx.shadowBlur=0;

  // food
  const pulse=Math.sin(Date.now()/150)*5;
  if(demogorgonFood){
    ctx.fillStyle=upsideDown?'#f44':'#f8f';ctx.shadowColor=upsideDown?'#f00':'#f0f';ctx.shadowBlur=20+pulse;
    for(let p=0;p<5;p++){const a=p*Math.PI*2/5+Date.now()/500;ctx.beginPath();ctx.arc(food.x*G+G/2+Math.cos(a)*(6+pulse/2),food.y*G+G/2+Math.sin(a)*(6+pulse/2),4,0,Math.PI*2);ctx.fill();}
    ctx.beginPath();ctx.arc(food.x*G+G/2,food.y*G+G/2,4,0,Math.PI*2);ctx.fill();
  }else{
    const fh=upsideDown?0:(hue+180)%360;
    ctx.fillStyle=`hsl(${fh},100%,65%)`;ctx.shadowColor=`hsl(${fh},100%,60%)`;ctx.shadowBlur=20+pulse;
    ctx.beginPath();ctx.arc(food.x*G+G/2,food.y*G+G/2,G/2-1+pulse/2,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;

  // border
  ctx.strokeStyle=upsideDown?`rgba(200,0,0,${.5+Math.sin(Date.now()/500)*.2})`:`hsl(${hue},80%,45%)`;
  ctx.lineWidth=upsideDown?3:2;ctx.strokeRect(0,0,canvas.width,canvas.height);ctx.lineWidth=1;

  // vignette
  const vg=ctx.createRadialGradient(300,200,80,300,200,350);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(${upsideDown?'30,0,0':'0,0,0'},${Math.min(.5,.15+score/60)})`);
  ctx.fillStyle=vg;ctx.fillRect(0,0,600,400);

  // random flicker
  if(upsideDown&&Math.random()<.02){ctx.fillStyle=`rgba(255,0,0,${Math.random()*.1})`;ctx.fillRect(0,0,600,400);}

  ctx.restore();
  if(score>10){const d=Math.sin(Date.now()/500)*(upsideDown?4:2);canvas.style.transform=`skew(${d*.3}deg,${d*.2}deg)`;}
}

function loop(){if(alive){step();draw();}}
function render(){if(alive&&started)draw();requestAnimationFrame(render);}
requestAnimationFrame(render);

// ambient upside down flicker
setInterval(()=>{if(!alive||!started)return;if(upsideDown&&Math.random()<.15){canvas.style.filter='saturate(0.3) brightness(0.4)';setTimeout(()=>{if(upsideDown)canvas.style.filter='saturate(0.5) brightness(0.7)';},80);}},300);

const sbEl=document.getElementById('soundboard');
sbSounds.forEach(s=>{
  const btn=document.createElement('div');

  btn.textContent=s.emoji+' '+s.label;
  btn.addEventListener('click',e=>{e.preventDefault();s.fn();popEmoji(1);});

// input (moved after soundboard)
document.addEventListener('keydown',e=>{
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  const d=map[e.key];if(!d)return;e.preventDefault();
  if(d.x+dir.x===0&&d.y+dir.y===0)return;
  dir=d;
  if(!started){started=true;tick=setInterval(loop,speedMs);document.getElementById('thought').textContent='locked in at hawkins 🔒🔴';beep(523,.1);beep(659,.1);showSTCharacter();}
});
