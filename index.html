<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🔴 SKIBIDI THINGS 🔴</title>
<meta property="og:title" content="Skibidi Things">
<meta property="og:description" content="the upside down has wifi now 🕷️">
<meta name="description" content="Stranger Things games with soundboard, dimension flipping, and existential commentary">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0008;
    color: #fff;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #lights { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .xmasLight {
    position: absolute; width: 8px; height: 8px; border-radius: 50%;
    opacity: 0; transition: opacity 0.2s;
  }
  .title {
    font-family: 'Creepster', cursive, 'Courier New', monospace;
    font-size: clamp(42px, 10vw, 72px);
    color: #c44;
    text-shadow: 0 0 30px rgba(200,0,0,0.6), 0 0 60px rgba(200,0,0,0.3);
    letter-spacing: 4px;
    margin-bottom: 8px;
    text-align: center;
    z-index: 1;
  }
  .subtitle {
    font-size: clamp(12px, 3vw, 16px);
    color: #888;
    margin-bottom: 48px;
    z-index: 1;
  }
  .modes { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; z-index: 1; }
  .mode-card {
    width: 260px;
    padding: 32px 24px;
    border-radius: 16px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: #fff;
  }
  .mode-card:hover { transform: translateY(-6px); }
  .mode-card:active { transform: translateY(-2px); }
  .card-snake {
    background: linear-gradient(135deg, #1a0020 0%, #0d0030 100%);
    border: 2px solid rgba(160,0,255,0.4);
    box-shadow: 0 0 30px rgba(160,0,255,0.15);
  }
  .card-snake:hover { box-shadow: 0 0 50px rgba(160,0,255,0.3); }
  .card-runner {
    background: linear-gradient(135deg, #200008 0%, #300010 100%);
    border: 2px solid rgba(200,50,50,0.4);
    box-shadow: 0 0 30px rgba(200,50,50,0.15);
  }
  .card-runner:hover { box-shadow: 0 0 50px rgba(200,50,50,0.3); }
  .card-emoji { font-size: 48px; margin-bottom: 16px; }
  .card-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .card-desc { font-size: 13px; color: #999; line-height: 1.5; }
  .footer {
    position: fixed; bottom: 16px;
    font-size: 11px; color: #444;
    z-index: 1;
  }
  @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');
</style>
</head><body>
<div id="lights"></div>
<div class="title">Skibidi Things</div>
<div class="subtitle">the upside down has wifi now 🕷️</div>
<div class="modes">
  <a class="mode-card card-snake" href="snake.html">
    <div class="card-emoji">🐍</div>
    <div class="card-title">Should I Stay<br>or Should I Grow</div>
    <div class="card-desc">eat. grow. don't hit walls.<br>classic snake with existential dread.</div>
  </a>
  <a class="mode-card card-runner" href="runner.html">
    <div class="card-emoji">🏃</div>
    <div class="card-title">Run Up That Hill</div>
    <div class="card-desc">dodge demogorgons. collect eggos.<br>3 lanes. 3 lives. 1 hill.</div>
  </a>
</div>
<div class="footer">friends dont lie. but this snake does.</div>
<script>
  // Christmas lights
  const container = document.getElementById('lights');
  const colors = ['#f00','#0f0','#ff0','#00f','#f0f','#0ff','#f80'];
  const lights = [];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div'); el.className = 'xmasLight';
    el.style.left = Math.random() * 95 + '%'; el.style.top = Math.random() * 95 + '%';
    el.style.background = colors[i % colors.length];
    el.style.boxShadow = `0 0 10px ${colors[i % colors.length]}`;
    container.appendChild(el); lights.push(el);
  }
  let p = 0;
  setInterval(() => {
    p++;
    lights.forEach((el, i) => {
      el.style.opacity = Math.sin(p * 0.3 + i * 1.7) > 0.2 ? '0.2' : '0';
    });
  }, 200);
</script>
</body></html>
