<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🔴 SKIBIDI THINGS — Run Up That Hill 🔴</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0018;
    color: #fff;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  #title {
    font-family: 'Creepster', cursive;
    font-size: 24px;
    color: #c44;
    text-shadow: 0 0 15px rgba(200,0,0,0.5);
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  canvas {
    border: 2px solid #444;
    cursor: pointer;
    max-width: calc(100vw - 20px);
  }
  #hint {
    font-size: 13px;
    color: #666;
    margin-top: 8px;
  }
  #back {
    position: fixed;
    top: 10px;
    left: 10px;
    color: #666;
    text-decoration: none;
    font-size: 14px;
  }
  #back:hover { color: #fff; }
</style>
</head><body>
<a id="back" href="index.html">← back</a>
<div id="title">Run Up That Hill</div>
<canvas id="c"></canvas>
<div id="hint">tap / click / space to jump. tap to start.</div>
<button id="importBtn" style="position:fixed;top:10px;right:10px;background:#333;color:#0f0;border:1px solid #0f0;padding:6px 14px;cursor:pointer;font:13px monospace;border-radius:4px;z-index:10">Browse GD Levels</button>
<div id="importModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:20;flex-direction:column;align-items:center;justify-content:center;gap:12px;overflow-y:auto;padding:20px">
  <div style="color:#0f0;font:bold 18px monospace">🔍 GD Level Browser</div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center">
    <input id="gdSearch" type="text" value="stereo madness" placeholder="Search levels..." style="width:220px;background:#111;color:#0f0;border:1px solid #0f0;font:13px monospace;padding:6px 10px;border-radius:4px">
    <select id="gdType" style="background:#111;color:#0f0;border:1px solid #444;font:12px monospace;padding:6px">
      <option value="0">Search</option>
      <option value="6">Featured</option>
      <option value="3">Trending</option>
      <option value="4">Recent</option>
      <option value="1">Most Downloaded</option>
      <option value="2">Most Liked</option>
      <option value="11">Awarded</option>
    </select>
    <button id="gdSearchBtn" style="background:#0f0;color:#000;border:none;padding:6px 16px;cursor:pointer;font:bold 13px monospace;border-radius:4px">SEARCH</button>
    <label style="color:#888;font:11px monospace">BPM: <input id="gdBpm" type="number" value="140" style="width:50px;background:#111;color:#0f0;border:1px solid #444;font:12px monospace;padding:2px 4px"></label>
  </div>
  <div id="gdResults" style="width:100%;max-width:700px;display:flex;flex-direction:column;gap:6px"></div>
  <div id="gdStatus" style="color:#f44;font:12px monospace;min-height:16px"></div>
  <div style="display:flex;gap:12px">
    <button id="gdCancel" style="background:#333;color:#fff;border:1px solid #666;padding:8px 16px;cursor:pointer;font:13px monospace;border-radius:4px">Close</button>
  </div>
  <div style="color:#444;font:10px monospace;margin-top:8px">Or paste raw level data:</div>
  <textarea id="gdData" style="width:80%;max-width:600px;height:80px;background:#111;color:#0f0;border:1px solid #333;font:11px monospace;padding:6px;resize:vertical" placeholder="Paste base64 GD level string..."></textarea>
  <button id="gdImport" style="background:#333;color:#0f0;border:1px solid #0f0;padding:6px 14px;cursor:pointer;font:12px monospace;border-radius:4px">IMPORT PASTED DATA</button>
</div>
<script src="js/pako.min.js"></script>
<script type="module" src="js/game.js"></script>
</body></html>
