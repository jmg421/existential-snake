<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🔴 SKIBIDI THINGS 🔴</title>
<meta property="og:title" content="Skibidi Things">
<meta property="og:description" content="run through hawkins. dodge demogorgons. collect eggos. 🧇">
<meta name="description" content="Stranger Things side-scrolling runner with lanes, dimension flipping, and existential commentary">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head><body>
<div id="lights"></div>
<button id="themeToggle">🌙</button>
<button id="pauseBtn-top" onclick="if(window.togglePause)window.togglePause()">⏸</button>
<div id="title">Skibidi Things</div>
<div id="subtitle">the upside down has wifi now</div>
<div id="score">aura: 0</div>
<canvas id="c" width="600" height="400"></canvas>
<div id="thought">swipe up/down to switch lanes. tap to jump. 🔴</div>
<div id="controls">
  <div class="dpad">
    <button class="dpad-btn dpad-up" data-dir="up">▲</button>
    <div class="dpad-mid">
      <button class="dpad-btn dpad-left" data-dir="left">◀</button>
      <button class="dpad-btn dpad-pause" id="pauseBtn">⏸</button>
      <button class="dpad-btn dpad-right" data-dir="right">▶</button>
    </div>
    <button class="dpad-btn dpad-down" data-dir="down">▼</button>
  </div>
</div>
<div id="shareBtn" class="sb-btn" style="position:fixed;bottom:12px;right:12px;z-index:100">📤 Share</div>
<div id="combo"></div>
<div id="dimension">THE RIGHT-SIDE UP</div>
<div id="gameover"><h1 id="goTitle"></h1><p id="lesson"></p><span onclick="restartGame()">[ run from vecna again ]</span></div>
<div id="watermark">the upside down has wifi now</div>
<div id="soundboard"></div>
<div id="pickers"><div id="skinpicker"></div><div id="trackpicker"></div></div>
<div id="vecna">🕷️</div>
<div id="pauseOverlay">⏸ PAUSED</div>
<script type="module" src="js/runner_main.js"></script>
</body></html>
